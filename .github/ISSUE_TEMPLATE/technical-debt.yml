name: Technical Debt
description: Track deferred engineering quality work.
title: "Debt: "
labels:
  - type/chore
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line debt statement.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What debt is being addressed now.
    validations:
      required: true

  - type: textarea
    id: non_scope
    attributes:
      label: Non-scope
      description: What is intentionally deferred.
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Why Now
      description: Explain urgency and impact.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Use checklist items only.
      placeholder: |
        - [ ] Debt item is reduced or removed
        - [ ] Validation evidence is linked
    validations:
      required: true

  - type: dropdown
    id: repo_owner
    attributes:
      label: Repository Owner
      options:
        - framekit
        - netkit
        - mediakit
        - cross-repo
    validations:
      required: true
